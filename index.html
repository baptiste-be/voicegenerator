<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Voice GeneratorFR - Entraînement</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Entraînement de l'IA</h1>
        
        <div id="text-container">
            <p id="target-text">
                <span class="word">Le</span> <span class="word">système</span> <span class="word">analyse</span> 
                <span class="word">mon</span> <span class="word">intonation</span> <span class="word">pour</span> 
                <span class="word">recréer</span> <span class="word">mon</span> <span class="word">empreinte</span> 
                <span class="word">vocale.</span> <span class="word">Chaque</span> <span class="word">mot</span> 
                <span class="word">prononcé</span> <span class="word">aide</span> <span class="word">le</span> 
                <span class="word">modèle</span> <span class="word">à</span> <span class="word">devenir</span> 
                <span class="word">plus</span> <span class="word">précis.</span>
            </p>
        </div>

        <div class="controls">
            <button id="startBtn">🎤 Commencer la lecture</button>
            <button id="stopBtn" disabled>💾 Sauvegarder l'empreinte</button>
        </div>

        <div id="status">En attente...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
